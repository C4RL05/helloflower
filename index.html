<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>helloflower</title>
    <style>
      :root {
        color-scheme: dark;
      }
      /* Native-app feel: nothing selectable, no long-press callout, no tap
         highlight anywhere. */
      * {
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none; /* no pull-to-refresh / overscroll glow */
        background: #000;
        font-family: "Typ1451", system-ui, sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
        touch-action: none; /* we handle all pointer gestures ourselves */
      }
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      img {
        -webkit-user-drag: none; /* no image drag / save sheet */
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
